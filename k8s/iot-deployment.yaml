apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-gateway-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-gateway
  template:
    metadata:
      labels:
        app: iot-gateway
    spec:
      containers:
      - name: iot-gateway
        image: chivolennon/iot-gateway:v3
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "150m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: iot-gateway-service
spec:
  type: NodePort
  selector:
    app: iot-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080