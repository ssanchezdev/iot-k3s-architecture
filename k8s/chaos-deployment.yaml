apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-engine-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-engine
  template:
    metadata:
      labels:
        app: chaos-engine
    spec:
      containers:
      - name: chaos-engine
        image: chivolennon/chaos-engine:v1
        ports:
        - containerPort: 8089
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-engine-service
spec:
  type: NodePort
  selector:
    app: chaos-engine
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30089
